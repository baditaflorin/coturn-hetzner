services:
  coturn:
    image: coturn/coturn:4.6
    restart: unless-stopped
    network_mode: host
    env_file: .env
    command: >
      -n
      --listening-ip=0.0.0.0
      --listening-port=3479
      --fingerprint
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --realm=${TURN_DOMAIN}
      --external-ip=${SERVER_IP}
      --min-port=49152
      --max-port=65535
      --no-multicast-peers
      --no-cli
      --log-file=stdout
    healthcheck:
      test: ["CMD", "turnutils_stunclient", "-p", "3479", "127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 3
