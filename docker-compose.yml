services:
  coturn:
    image: coturn/coturn:4.6
    restart: unless-stopped
    network_mode: host
    command: >
      -n
      --listening-port=3478
      --tls-listening-port=5349
      --fingerprint
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --realm=${TURN_DOMAIN}
      --external-ip=${SERVER_IP}
      --min-port=49152
      --max-port=65535
      --no-multicast-peers
      --no-cli
      --log-file=stdout
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD", "turnutils_uclient", "-t", "-p", "3478", "127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 3
