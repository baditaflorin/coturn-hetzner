# Example nginx config for coturn-hetzner.
#
# IMPORTANT: nginx is NOT needed for TURN itself. TURN/STUN traffic flows
# directly to coturn on UDP/TCP 3478 (or 3479 in this repo's default) — nginx
# can't proxy UDP and isn't in the data path.
#
# This nginx config is ONLY for exposing coturn's built-in Prometheus exporter
# (`--prometheus`, port 9641) over HTTPS to a remote scraper. If you scrape
# from inside the same network/VPC, you can skip nginx entirely and connect
# Prometheus straight to `http://YOUR_TURN_HOST:9641/metrics`.

# HTTP block: ACME challenge + redirect.
server {
    listen 80;
    listen [::]:80;
    server_name turn-metrics.example.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS block: gated Prometheus scrape endpoint.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name turn-metrics.example.com;

    ssl_certificate     /etc/letsencrypt/live/turn-metrics.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turn-metrics.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Restrict /metrics to your Prometheus scraper. Public exposure of these
    # metrics reveals concurrent session counts and bandwidth, which helps an
    # attacker tune denial-of-service campaigns.
    location = /metrics {
        # allow 10.0.0.5;          # your Prometheus host
        # deny  all;

        # Optional HTTP basic auth — generate a passwords file with:
        #   htpasswd -c /etc/nginx/.htpasswd-coturn prometheus
        # auth_basic           "coturn metrics";
        # auth_basic_user_file /etc/nginx/.htpasswd-coturn;

        proxy_pass http://127.0.0.1:9641/metrics;
        proxy_set_header Host $host;
    }

    location / { return 404; }
}
